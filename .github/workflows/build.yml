name: Build bootstrap images

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: x86_64,      libc: glibc, runner: ubuntu-latest    }
          - { name: x86_64-musl, libc: musl,  runner: ubuntu-latest    }
          - { name: aarch64,     libc: glibc, runner: ubuntu-24.04-arm }

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: LIBC=${{ matrix.libc }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/void-bootstrap-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/void-bootstrap-${{ matrix.name }}:${{ github.run_id }}
