name: Build bootstrap images

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: x86_64, libc: glibc, runner: ubuntu-latest }
          - { name: x86_64-musl, libc: musl, runner: ubuntu-latest }
          - { name: aarch64, libc: glibc, runner: ubuntu-24.04-arm }
          - { name: aarch64-musl, libc: musl, runner: ubuntu-24.04-arm }

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build bootstrap
        run: |
          docker rm -f bootstrap 2>/dev/null || true
          docker run --privileged --name bootstrap \
            ghcr.io/void-linux/void-${{ matrix.libc }}-full:latest \
            sh -c "
              set -e
              mkdir -p /etc/xbps.d
              cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
              sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
              xbps-install -Syu xbps
              xbps-install -yu
              xbps-install -y sudo bash curl fuse3 git python3 rclone rsync xtools zstd
              ${{ matrix.name == 'x86_64' && 'xbps-install -y pandoc' || 'true' }}
              useradd -G xbuilder -M builder
              git clone --depth 1 https://github.com/void-linux/void-packages.git /void-packages
              chown -R builder:builder /void-packages
              cd /void-packages
              sudo -Eu builder common/travis/set_mirror.sh
              sudo -Eu builder common/travis/prepare.sh
              common/travis/fetch-xtools.sh
              chown -R builder:builder .
              rm -rf hostdir/sources/* masterdir-*/var/cache/xbps/*
            "

      - name: Commit and push
        run: |
          IMAGE="ghcr.io/osowoso/oco-builder-${{ matrix.name }}"
          docker commit --change='WORKDIR /void-packages' bootstrap "${IMAGE}:latest"
          docker tag "${IMAGE}:latest" "${IMAGE}:${{ github.run_id }}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.run_id }}"
